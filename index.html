<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1c20;
      --card:     #1f2227;
      --border:   #2e3138;
      --text:     #e2e4e8;
      --muted:    #6b7280;
      --accent:   #4ade80;
      --sans:     system-ui, -apple-system, sans-serif;
      --mono:     ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.65;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Layout ── */
    .outer {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 28px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 18px;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: normal;
      color: var(--accent);
      font-family: var(--sans);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    header .fullname {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
    }

    header #updated {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Feed ── */
    #feed {
      display: flex;
      flex-direction: column;
    }

    /* ── Feed item ── */
    .item {
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 24px;
      row-gap: 0;
    }

    .item:first-child {
      border-top: 1px solid var(--border);
    }

    /* Row 1: description + value */
    .item-description {
      grid-column: 1;
      grid-row: 1;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      align-self: start;
    }

    .item-value {
      grid-column: 2;
      grid-row: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      text-align: right;
      align-self: start;
    }

    /* Row 2: meta — country · date · score */
    .item-meta {
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .item-iso {
      font-family: var(--mono);
      font-size: 11px;
    }

    .meta-sep {
      color: var(--border);
      user-select: none;
    }

    /* Row 3: why-toggle */
    .item-why {
      grid-column: 1 / -1;
      grid-row: 3;
      margin-top: 8px;
    }

    .why-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--sans);
      line-height: 1;
    }

    .why-toggle:hover { color: var(--text); }

    .why-chevron {
      display: inline-block;
      font-size: 10px;
      transition: transform 0.18s ease;
      line-height: 1;
    }

    .why-toggle[aria-expanded="true"] .why-chevron {
      transform: rotate(90deg);
    }

    .why-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, opacity 0.18s ease;
      opacity: 0;
    }

    .why-body.open {
      max-height: 200px;
      opacity: 1;
    }

    .why-inner {
      padding-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .why-rationale { color: var(--muted); }

    .why-interests { color: var(--muted); }

    .why-score {
      color: var(--muted);
      font-size: 11px;
    }

    /* Row 4: source link */
    .item-source {
      grid-column: 1 / -1;
      grid-row: 4;
      margin-top: 8px;
      text-align: right;
    }

    .item-source a {
      font-size: 12px;
      color: var(--muted);
    }

    .item-source a:hover {
      text-decoration: underline;
    }

    /* ── States ── */
    #status {
      color: var(--muted);
      font-size: 13px;
      padding: 20px 0;
    }

    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="outer">
    <header>
      <h1>HARPY</h1>
      <span class="fullname">Hidden Action Reconnaissance Pre-narrative Yield</span>
      <span id="updated"></span>
    </header>
    <div id="status">fetching signals…</div>
    <div id="feed"></div>
  </div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) {
        const n = v / 1e9;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B';
      }
      if (v >= 1e6) {
        const n = v / 1e6;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M';
      }
      if (v >= 1e3) {
        const n = v / 1e3;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K';
      }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile) {
      const country = profile ? profile.name : sig.iso;
      const score   = profile ? profile.structural_interest_score : null;

      const el = document.createElement('div');
      el.className = 'item';

      // "Why this matters" section — only if profile exists
      let whyHtml = '';
      if (profile) {
        const rationale  = profile.score_rationale || '';
        const interests  = Array.isArray(profile.key_structural_interests) && profile.key_structural_interests.length
                         ? profile.key_structural_interests.join(', ')
                         : '';
        const scoreLabel = score != null ? `Structural interest: ${score}/10` : '';

        whyHtml = `
          <div class="item-why">
            <button class="why-toggle" aria-expanded="false">
              <span class="why-chevron">›</span>Why this matters
            </button>
            <div class="why-body">
              <div class="why-inner">
                ${rationale  ? `<div class="why-rationale">${esc(rationale)}</div>` : ''}
                ${interests  ? `<div class="why-interests">${esc(interests)}</div>` : ''}
                ${scoreLabel ? `<div class="why-score">${esc(scoreLabel)}</div>` : ''}
              </div>
            </div>
          </div>`;
      }

      const sourceHtml = sig.page_url
        ? `<div class="item-source"><a href="${esc(sig.page_url)}" target="_blank" rel="noopener">source →</a></div>`
        : '';

      el.innerHTML = `
        <div class="item-description">${esc(sig.description || '—')}</div>
        <div class="item-value">${fmtValue(sig.value_usd)}</div>
        <div class="item-meta">
          <span>${esc(country)}</span>
          <span class="item-iso">${esc(sig.iso)}</span>
          <span class="meta-sep">·</span>
          <span>${fmtDate(sig.signal_date)}</span>
          ${score != null ? `<span class="meta-sep">·</span><span>${score}/10</span>` : ''}
        </div>
        ${whyHtml}
        ${sourceHtml}
      `.trim();

      // Toggle handler
      const btn = el.querySelector('.why-toggle');
      if (btn) {
        btn.addEventListener('click', () => {
          const expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          el.querySelector('.why-body').classList.toggle('open', !expanded);
        });
      }

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const feedEl    = document.getElementById('feed');
      const updatedEl = document.getElementById('updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe on cn_number, filter empties, sort newest first
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.value_usd != null || s.description)
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        feedEl.innerHTML = '<div id="status">no signals</div>';
        return;
      }

      // Fetch all profiles in parallel, then render in order
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      for (const sig of signals) {
        feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null));
      }
    }

    main();
  </script>
</body>
</html>
