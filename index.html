<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARPY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0f;
      --panel:  #0f0f1a;
      --border: #1e2a3a;
      --text:   #8899aa;
      --dim:    #4a5a6a;
      --accent: #00ff88;
      --alert:  #6b0000;
      --mono:   "Courier New", Courier, monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .outer {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: normal;
      letter-spacing: 0.18em;
      color: var(--accent);
      font-family: var(--mono);
    }

    header .subtitle {
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ── Feed ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    /* ── Feed item ── */
    .item {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 18px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 20px;
    }

    .item:hover {
      border-color: #2e3f54;
    }

    /* Row 1: description (headline) + value */
    .item-description {
      grid-column: 1;
      grid-row: 1;
      font-size: 14px;
      color: #c8d8e8;
      letter-spacing: 0.01em;
      align-self: start;
    }

    .item-value {
      grid-column: 2;
      grid-row: 1;
      font-size: 14px;
      color: var(--accent);
      white-space: nowrap;
      text-align: right;
      align-self: start;
      letter-spacing: 0.02em;
    }

    /* Row 2: country + date + score */
    .item-meta {
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 7px;
      flex-wrap: wrap;
    }

    .item-country {
      color: var(--text);
      font-size: 12px;
    }

    .item-iso {
      color: var(--dim);
      font-size: 11px;
      margin-left: 5px;
    }

    .item-date {
      color: var(--dim);
      font-size: 11px;
    }

    .item-score {
      color: var(--dim);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .score-dots {
      display: inline-flex;
      gap: 2px;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: var(--border);
      display: inline-block;
    }

    .dot.on {
      background: var(--accent);
      opacity: 0.55;
    }

    /* Row 3: context + source link */
    .item-footer {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      gap: 16px;
    }

    .item-context {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .item-source a {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .item-source a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── States ── */
    #status {
      color: var(--dim);
      font-size: 12px;
      padding: 24px 0;
      letter-spacing: 0.04em;
    }

    #status.error { color: #cc3333; }
  </style>
</head>
<body>
  <div class="outer">
    <header>
      <h1>HARPY</h1>
      <div class="subtitle" id="last-updated">—</div>
    </header>
    <div id="status">fetching signals…</div>
    <div id="feed"></div>
  </div>

  <script>
    const PROFILES_BASE = 'data/profiles/';
    const SIGNALS_URL   = 'data/signals.json';

    // ── Formatters ──────────────────────────────────────────────────────────

    function fmtValue(v) {
      if (v == null) return '';
      if (v >= 1e9) {
        const n = v / 1e9;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'B';
      }
      if (v >= 1e6) {
        const n = v / 1e6;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'M';
      }
      if (v >= 1e3) {
        const n = v / 1e3;
        return '$' + (Number.isInteger(n) ? n : n.toFixed(1)) + 'K';
      }
      return '$' + v.toFixed(0);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function fmtUpdated(isoStr) {
      if (!isoStr) return '';
      const dt = new Date(isoStr);
      return 'last updated ' + dt.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    function scoreDots(score) {
      const n = Math.min(Math.max(Math.round(score || 0), 0), 10);
      let html = '<span class="score-dots">';
      for (let i = 0; i < 10; i++) {
        html += `<span class="dot${i < n ? ' on' : ''}"></span>`;
      }
      return html + '</span>';
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Profile cache ────────────────────────────────────────────────────────

    const profileCache = {};

    async function loadProfile(iso) {
      if (iso in profileCache) return profileCache[iso];
      try {
        const r = await fetch(PROFILES_BASE + iso + '.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        profileCache[iso] = await r.json();
      } catch (e) {
        console.warn(`[HARPY] no profile for ${iso}:`, e.message);
        profileCache[iso] = null;
      }
      return profileCache[iso];
    }

    // ── Render one item ──────────────────────────────────────────────────────

    function renderItem(sig, profile) {
      const country = profile ? profile.name : sig.iso;
      const score   = profile ? profile.structural_interest_score : null;
      const context = profile && Array.isArray(profile.key_structural_interests) && profile.key_structural_interests.length
                    ? profile.key_structural_interests[0]
                    : null;

      const el = document.createElement('div');
      el.className = 'item';

      const sourceHtml = sig.page_url
        ? `<a href="${esc(sig.page_url)}" target="_blank" rel="noopener">source →</a>`
        : '';

      const scoreHtml = score != null
        ? `<span class="item-score">${scoreDots(score)}<span>${score}/10</span></span>`
        : '';

      el.innerHTML = `
        <div class="item-description">${esc(sig.description || '—')}</div>
        <div class="item-value">${fmtValue(sig.value_usd)}</div>
        <div class="item-meta">
          <span class="item-country">${esc(country)}<span class="item-iso">${esc(sig.iso)}</span></span>
          <span class="item-date">${fmtDate(sig.signal_date)}</span>
          ${scoreHtml}
        </div>
        <div class="item-footer">
          <span class="item-context">${context ? esc(context) : ''}</span>
          <span class="item-source">${sourceHtml}</span>
        </div>
      `.trim();

      return el;
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    async function main() {
      const statusEl  = document.getElementById('status');
      const feedEl    = document.getElementById('feed');
      const updatedEl = document.getElementById('last-updated');

      let data;
      try {
        const r = await fetch(SIGNALS_URL);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'error loading signals.json — ' + e.message;
        statusEl.className = 'error';
        return;
      }

      updatedEl.textContent = fmtUpdated(data.generated_at);

      // Dedupe on cn_number, filter empties, sort newest first
      const seen = new Set();
      const signals = (data.signals || [])
        .filter(s => s.value_usd != null || s.description)
        .filter(s => {
          const key = s.cn_number || `${s.iso}|${s.signal_date}|${s.description}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => (b.signal_date || '').localeCompare(a.signal_date || ''));

      statusEl.remove();

      if (!signals.length) {
        feedEl.innerHTML = '<div id="status">no signals</div>';
        return;
      }

      // Fetch all profiles in parallel, then render in order
      await Promise.all([...new Set(signals.map(s => s.iso))].map(loadProfile));

      for (const sig of signals) {
        feedEl.appendChild(renderItem(sig, profileCache[sig.iso] || null));
      }
    }

    main();
  </script>
</body>
</html>
